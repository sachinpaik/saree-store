name = "upload-signer"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# R2 + Supabase secrets: set via GitHub Actions (recommended) or manually:
#   docs/DEPLOY_FROM_GITHUB.md  →  .github/workflows/deploy-upload-signer.yml
# Or: wrangler secret put CLOUDFLARE_R2_ACCOUNT_ID  (etc.)
#
# Optional CORS allowlist: variable name CORS_ORIGINS (comma-separated origins).
# Do NOT put real domains in this file — set them in Cloudflare Dashboard (Worker →
# Settings → Variables), or at deploy time: wrangler deploy --var CORS_ORIGINS:"$CORS_ORIGINS"
# (e.g. from GitLab CI/CD variables). For local dev only, use .dev.vars (gitignored).

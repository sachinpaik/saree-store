# Deploy Cloudflare Worker: apps/upload-signer — fully from GitHub
#
# Required GitHub Actions secrets (repo → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#   CLOUDFLARE_R2_ACCOUNT_ID
#   CLOUDFLARE_R2_ACCESS_KEY_ID
#   CLOUDFLARE_R2_SECRET_ACCESS_KEY
#   CLOUDFLARE_R2_BUCKET
#   At least one of:
#     SUPABASE_JWT_SECRET        — Legacy HS256 shared secret (Supabase → API → JWT Secret)
#     UPLOAD_SIGNER_SUPABASE_URL — Project URL for ECC/ES256 (JWKS); required if no HS256 secret
#
# Optional:
#   UPLOAD_SIGNER_CORS_ORIGINS   — comma-separated admin origins (plain Worker var)
#
# Docs: apps/upload-signer/docs/DEPLOY_FROM_GITHUB.md

name: Deploy upload-signer

on:
  push:
    branches:
      - main
    paths:
      - "apps/upload-signer/**"
      - ".github/workflows/deploy-upload-signer.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/upload-signer/package-lock.json

      - name: Install dependencies
        working-directory: apps/upload-signer
        run: npm ci

      # Deploy first so the Worker exists; then attach secrets.
      - name: Deploy Worker
        working-directory: apps/upload-signer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          UPLOAD_SIGNER_CORS_ORIGINS: ${{ secrets.UPLOAD_SIGNER_CORS_ORIGINS }}
        run: |
          set -euo pipefail
          if [ -n "${UPLOAD_SIGNER_CORS_ORIGINS:-}" ]; then
            npx wrangler deploy --var "CORS_ORIGINS=${UPLOAD_SIGNER_CORS_ORIGINS}"
          else
            npx wrangler deploy
          fi

      - name: Sync Worker secrets from GitHub
        working-directory: apps/upload-signer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          V_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          V_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          V_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          V_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          V_SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          V_SUPABASE_URL: ${{ secrets.UPLOAD_SIGNER_SUPABASE_URL }}
        run: |
          set -euo pipefail
          put_required() {
            local name="$1"
            local val="$2"
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub Actions secret for Worker binding: $name"
              echo "See apps/upload-signer/docs/DEPLOY_FROM_GITHUB.md"
              exit 1
            fi
            printf '%s' "$val" | npx wrangler secret put "$name"
          }
          put_required CLOUDFLARE_R2_ACCOUNT_ID "$V_R2_ACCOUNT_ID"
          put_required CLOUDFLARE_R2_ACCESS_KEY_ID "$V_R2_ACCESS_KEY_ID"
          put_required CLOUDFLARE_R2_SECRET_ACCESS_KEY "$V_R2_SECRET_ACCESS_KEY"
          put_required CLOUDFLARE_R2_BUCKET "$V_R2_BUCKET"
          if [ -z "${V_SUPABASE_JWT_SECRET:-}" ] && [ -z "${V_SUPABASE_URL:-}" ]; then
            echo "::error::Set SUPABASE_JWT_SECRET (HS256) and/or UPLOAD_SIGNER_SUPABASE_URL (ECC/ES256 JWKS). See apps/upload-signer/docs/SUPABASE_JWT_SIGNING_KEYS.md"
            exit 1
          fi
          if [ -n "${V_SUPABASE_JWT_SECRET:-}" ]; then
            printf '%s' "$V_SUPABASE_JWT_SECRET" | npx wrangler secret put SUPABASE_JWT_SECRET
          fi
          if [ -n "${V_SUPABASE_URL:-}" ]; then
            printf '%s' "$V_SUPABASE_URL" | npx wrangler secret put SUPABASE_URL
          fi

      - name: Deployment summary
        run: |
          echo "## upload-signer" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Worker **upload-signer** was deployed and secrets were synced from GitHub." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Find the URL in Cloudflare → **Workers & Pages** → **upload-signer** → **Triggers** (e.g. \`*.workers.dev\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "Set admin \`NEXT_PUBLIC_UPLOAD_SIGNER_URL\` to that base URL (no trailing slash)." >> "$GITHUB_STEP_SUMMARY"
